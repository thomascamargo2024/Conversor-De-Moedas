<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="media.css">
</head>
<body>
    <div class="pai">
        <main class="container">
            <div class="titulo">
                Conversor de moedas
            </div>
            <section class="inputs">
                <p>Converter de </p>
                    <select name="" id="">
                        <option value="">
                            R$ Real Brasileiro
                        </option>
                    </select>
                <p>Converter para</p>
                <select name="" id="caixaSelect">
                    <option value="US$ Dólar">
                        US$ Dólar Americano
                    </option>
                    <option value="€ Euro" id="opcaoEuro">
                            € Euro
                    </option>
                    <option value="Bitcoin" id="">
                            Bitcoin
                    </option>
                </select>
                <label for="">Valor
                </label>
                <input type="number" id="Valor-Converter">
            </section>
            <button class="botao-converte">
                Converter
            </button>
            <div class="moedas">
                <div class="imagens">
                    <div class="real">
                        <img src="./assets/icons8-brasil-circular-48.png" alt="">
                        <p>real</p>
                        <h2 class="valorReal">R$ 10.000,00</h2>
                    </div>
                    <img src="./assets/icons8-flecha-50.png" alt="">
                    <div class="dolar">
                        <img src="./assets/icons8-circular-dos-eua-48.png" alt="" id="img-Dolar">
                        <p class="texto-Dolar">Dólar Americano</p>
                        <h2 class="valorDolar">US$ 2.000,00</h2>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
